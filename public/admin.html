<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін панель — МійАукціон</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .admin-table { width:100%;border-collapse:collapse; }
        .admin-table th { padding:14px 16px;text-align:left;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;color:var(--text-muted);border-bottom:1px solid var(--border);background:rgba(15,23,42,0.5); }
        .admin-table td { padding:12px 16px;font-size:0.85rem;color:var(--text-secondary);border-bottom:1px solid var(--border); }
        .admin-table tr:hover td { background:rgba(16,185,129,0.04); }
        .admin-table a { color:var(--accent);text-decoration:none; }
        .admin-table a:hover { text-decoration:underline; }
        .btn-sm { padding:6px 12px;border:none;border-radius:8px;cursor:pointer;font-size:0.78rem;font-weight:600;transition:all 0.2s;font-family:inherit; }
        .btn-danger { background:rgba(239,68,68,0.1);color:var(--danger);border:1px solid rgba(239,68,68,0.3); }
        .btn-danger:hover { background:var(--danger);color:white; }
        .btn-warning { background:rgba(245,158,11,0.1);color:var(--amber);border:1px solid rgba(245,158,11,0.3); }
        .btn-warning:hover { background:var(--amber);color:white; }
        .btn-primary-sm { background:rgba(16,185,129,0.1);color:var(--accent);border:1px solid rgba(16,185,129,0.3); }
        .btn-primary-sm:hover { background:var(--accent);color:white; }
        .search-bar { display:flex;gap:8px;margin-bottom:16px; }
        .search-bar input { flex:1;padding:12px 16px;border:1px solid var(--border);border-radius:10px;font-size:0.9rem;background:var(--bg-card);color:var(--text-primary);font-family:inherit;outline:none; }
        .search-bar input:focus { border-color:var(--accent); }
        .search-bar button { padding:12px 20px;background:var(--accent);color:white;border:none;border-radius:10px;cursor:pointer;font-weight:600;font-family:inherit; }
        .alert { padding:14px 20px;border-radius:12px;margin-bottom:16px;display:none;font-weight:500;font-size:0.9rem; }
        .alert-success { background:rgba(16,185,129,0.1);color:var(--accent);border:1px solid rgba(16,185,129,0.3);display:block; }
        .alert-error { background:rgba(239,68,68,0.1);color:var(--danger);border:1px solid rgba(239,68,68,0.3);display:block; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header__top-bar">
            <span class="accent">⚙️ Адмін панель</span>
        </div>
        <div class="header__container">
            <div class="header__left">
                <a href="index.html" class="header__logo">
                    <div class="header__logo-icon">💎</div>
                    <div>
                        <div class="header__logo-text">МійАукціон<span class="accent">.UA</span></div>
                        <div class="header__logo-sub">Admin Panel</div>
                    </div>
                </a>
            </div>
            <div class="header__right">
                <a href="cabinet.html" class="btn btn--ghost btn--sm">Кабінет</a>
                <a href="index.html" class="btn btn--secondary btn--sm">На сайт</a>
            </div>
        </div>
    </header>

    <main class="admin">
        <h1 class="admin__title">⚙️ Адмін панель</h1>

        <div class="admin__stats" id="stats"></div>

        <div style="display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:4px;">
            <button class="cabinet__tab active" data-section="users">Користувачі</button>
            <button class="cabinet__tab" data-section="lots">Лоти</button>
            <button class="cabinet__tab" data-section="purchases">Покупки</button>
        </div>

        <div id="alert" class="alert"></div>

        <div id="section-users" class="cabinet__panel active">
            <div class="search-bar">
                <input type="text" id="userSearch" placeholder="Пошук за логіном або email...">
                <button onclick="loadUsers()">🔍 Знайти</button>
            </div>
            <div class="admin__table" style="overflow-x:auto;">
                <table class="admin-table">
                    <thead><tr>
                        <th>ID</th><th>Логін</th><th>Email</th><th>Ім'я</th><th>Місто</th>
                        <th>Рейтинг</th><th>Роль</th><th>Статус</th><th>Дата</th><th>Дії</th>
                    </tr></thead>
                    <tbody id="usersTable"></tbody>
                </table>
            </div>
            <div id="usersPagination" class="pagination"></div>
        </div>

        <div id="section-lots" class="cabinet__panel">
            <div class="search-bar">
                <input type="text" id="lotSearch" placeholder="Пошук за назвою лота...">
                <button onclick="loadLots()">🔍 Знайти</button>
            </div>
            <select id="lotStatusFilter" onchange="loadLots()" style="padding:12px 16px;border:1px solid var(--border);border-radius:10px;margin-bottom:16px;background:var(--bg-card);color:var(--text-primary);font-family:inherit;font-size:0.88rem;">
                <option value="active">Активні</option>
                <option value="completed">Завершені</option>
                <option value="sold">Продані</option>
                <option value="expired">Прострочені</option>
            </select>
            <div class="admin__table" style="overflow-x:auto;">
                <table class="admin-table">
                    <thead><tr><th>ID</th><th>Назва</th><th>Продавець</th><th>Ціна</th><th>Ставки</th><th>Статус</th><th>Дата</th><th>Дії</th></tr></thead>
                    <tbody id="lotsTable"></tbody>
                </table>
            </div>
            <div id="lotsPagination" class="pagination"></div>
        </div>

        <div id="section-purchases" class="cabinet__panel">
            <div class="lot-page__card" style="text-align:center;padding:40px;">
                <p style="color:var(--text-secondary);">Управління покупками в розробці. Використовуйте розділ "Лоти" для модерації.</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer__container">
            <div class="footer__bottom">
                <p>© 2026 МійАукціон. Адмін панель.</p>
            </div>
        </div>
    </footer>

    <script>
        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        const API = new (class { constructor() { this.token = localStorage.getItem('authToken'); }
            getHeaders() { return { 'Content-Type':'application/json', ...(this.token?{'Authorization':'Bearer '+this.token}:{}) }; }
            async get(url) { const r=await fetch(url,{headers:this.getHeaders()});const d=await r.json();if(!r.ok)throw new Error(d.error);return d; }
            async put(url) { const r=await fetch(url,{method:'PUT',headers:this.getHeaders()});const d=await r.json();if(!r.ok)throw new Error(d.error);return d; }
            async del(url) { const r=await fetch(url,{method:'DELETE',headers:this.getHeaders()});const d=await r.json();if(!r.ok)throw new Error(d.error);return d; }
        })();

        function alertMsg(msg, type='success') {
            const el = document.getElementById('alert');
            el.textContent = msg;
            el.className = 'alert alert-' + type;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        async function loadStats() {
            try {
                const s = await API.get('/api/admin/stats');
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card"><span class="stat-card__value accent">${s.totalUsers}</span><span class="stat-card__label">Користувачів</span></div>
                    <div class="stat-card"><span class="stat-card__value violet">${s.activeLots}</span><span class="stat-card__label">Активних лотів</span></div>
                    <div class="stat-card"><span class="stat-card__value">${s.totalBids}</span><span class="stat-card__label">Ставок</span></div>
                    <div class="stat-card"><span class="stat-card__value amber">${s.totalPurchases}</span><span class="stat-card__label">Очікує оплати</span></div>
                    <div class="stat-card"><span class="stat-card__value accent">${s.completedPurchases}</span><span class="stat-card__label">Завершених</span></div>
                    <div class="stat-card"><span class="stat-card__value violet">${Number(s.revenue).toLocaleString('uk-UA')} ₴</span><span class="stat-card__label">Оборот</span></div>
                    <div class="stat-card"><span class="stat-card__value amber">${s.newUsersToday}</span><span class="stat-card__label">Нових сьогодні</span></div>
                `;
            } catch(e) { alertMsg('Помилка завантаження статистики', 'error'); }
        }

        async function loadUsers(page=1) {
            const search = document.getElementById('userSearch').value;
            try {
                const d = await API.get('/api/admin/users?page='+page+'&limit=50'+(search?'&search='+encodeURIComponent(search):''));
                const tbody = document.getElementById('usersTable');
                tbody.innerHTML = d.users.map(u => `
                    <tr>
                        <td>${u.id}</td>
                        <td><strong style="color:white">${esc(u.username)}</strong></td>
                        <td>${esc(u.email||'')}</td>
                        <td>${esc(u.first_name||'')} ${esc(u.last_name||'')}</td>
                        <td>${esc(u.city||'')}</td>
                        <td style="color:var(--amber)">${u.rating||0} ★ (${u.reviews_count||0})</td>
                        <td>${u.is_admin?'<span class="badge badge--pending">Адмін</span>':'<span class="badge badge--active">Користувач</span>'}</td>
                        <td>${u.is_active?'<span class="badge badge--active">Активний</span>':'<span class="badge badge--banned">Заблокований</span>'}</td>
                        <td style="font-size:0.78rem;color:var(--text-muted)">${u.created_at?new Date(u.created_at).toLocaleDateString('uk-UA'):''}</td>
                        <td style="white-space:nowrap">
                            <button class="btn-sm ${u.is_active?'btn-danger':'btn-primary-sm'}" onclick="toggleBan(${u.id})">${u.is_active?'🔒 Блок':'🔓 Розбл'}</button>
                            <button class="btn-sm ${u.is_admin?'btn-warning':'btn-primary-sm'}" onclick="toggleAdmin(${u.id})">${u.is_admin?'👤 Розжал':'⭐ Зробити'}</button>
                        </td>
                    </tr>
                `).join('');
                renderPagination('usersPagination', d.pagination, loadUsers);
            } catch(e) { alertMsg(e.message, 'error'); }
        }

        async function toggleBan(id) {
            try { const r = await API.put('/api/admin/users/'+id+'/toggle-ban'); alertMsg(r.message); loadUsers(); }
            catch(e) { alertMsg(e.message, 'error'); }
        }

        async function toggleAdmin(id) {
            try { const r = await API.put('/api/admin/users/'+id+'/toggle-admin'); alertMsg(r.message); loadUsers(); }
            catch(e) { alertMsg(e.message, 'error'); }
        }

        async function loadLots(page=1) {
            const search = document.getElementById('lotSearch').value;
            const status = document.getElementById('lotStatusFilter').value;
            try {
                const d = await API.get('/api/admin/lots?page='+page+'&limit=50&status='+status+(search?'&search='+encodeURIComponent(search):''));
                const tbody = document.getElementById('lotsTable');
                tbody.innerHTML = d.lots.map(l => `
                    <tr>
                        <td>${l.id}</td>
                        <td><a href="lot.html?id=${l.id}" target="_blank">${esc(l.title||'').slice(0,50)}</a></td>
                        <td>${esc(l.seller_name||'')}</td>
                        <td style="color:var(--accent);font-weight:700;font-family:'JetBrains Mono',monospace;">${Number(l.current_price||l.start_price||0).toLocaleString('uk-UA')} ₴</td>
                        <td>${l.bids_count||0}</td>
                        <td><span class="badge badge--${l.status==='active'?'active':l.status==='completed'?'pending':'banned'}">${l.status}</span></td>
                        <td style="font-size:0.78rem;color:var(--text-muted)">${l.created_at?new Date(l.created_at).toLocaleDateString('uk-UA'):''}</td>
                        <td><button class="btn-sm btn-danger" onclick="deleteLot(${l.id})">🗑️ Видалити</button></td>
                    </tr>
                `).join('');
                renderPagination('lotsPagination', d.pagination, loadLots);
            } catch(e) { alertMsg(e.message, 'error'); }
        }

        async function deleteLot(id) {
            if (!confirm('Видалити лот #'+id+'?')) return;
            try { const r = await API.del('/api/admin/lots/'+id); alertMsg(r.message); loadLots(); }
            catch(e) { alertMsg(e.message, 'error'); }
        }

        function renderPagination(id, p, cb) {
            const el = document.getElementById(id);
            if (!el) return;
            if (p.pages <= 1) { el.innerHTML = ''; return; }
            let html = '';
            for (let i = 1; i <= p.pages; i++) {
                if (i > 10 && i < p.pages) { if (i === 11) html += '<span class="pagination__dots">...</span>'; continue; }
                html += `<button class="pagination__btn ${i===p.page?'active':''}" onclick="${cb.name}(${i})">${i}</button>`;
            }
            el.innerHTML = html;
        }

        // Tabs
        document.querySelectorAll('[data-section]').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('[data-section]').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.cabinet__panel').forEach(s => s.classList.remove('active'));
                tab.classList.add('active');
                const section = document.getElementById('section-'+tab.dataset.section);
                if (section) section.classList.add('active');
            });
        });

        // Init
        document.addEventListener('DOMContentLoaded', async () => {
            if (!localStorage.getItem('authToken')) { window.location.href = 'login.html'; return; }
            try { await API.get('/api/admin/stats'); } catch(e) {
                alertMsg('Доступ заборонено. Потрібні права адміністратора.', 'error');
                setTimeout(() => window.location.href = 'index.html', 2000);
                return;
            }
            await loadStats();
            await loadUsers();
            await loadLots();
        });
    </script>
</body>
</html>
