<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід — МійАукціон</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header__container">
            <div class="header__left">
                <a href="index.html" class="header__logo">
                    <div class="header__logo-icon">💎</div>
                    <div>
                        <div class="header__logo-text">МійАукціон<span class="accent">.UA</span></div>
                        <div class="header__logo-sub">Premium Marketplace</div>
                    </div>
                </a>
            </div>
            <div class="header__right">
                <a href="register.html" class="btn btn--ghost btn--sm">Реєстрація</a>
            </div>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-page__glow"></div>
        <div class="auth-card">
            <div class="auth-card__logo">
                <div class="header__logo-icon" style="margin:0 auto;width:56px;height:56px;font-size:28px;">💎</div>
                <h1 class="auth-card__title">Вхід в акаунт</h1>
                <p class="auth-card__subtitle">Увійдіть, щоб робити ставки та продавати</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email або логін</label>
                    <input type="text" id="email" class="form-input" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Пароль</label>
                    <input type="password" id="password" class="form-input" placeholder="Введіть пароль" required>
                    <a href="#" class="form-link" style="display:inline-block;margin-top:6px;font-size:0.82rem;">Забули пароль?</a>
                </div>
                <div class="form-group">
                    <label style="display:flex;align-items:center;gap:8px;font-size:0.88rem;color:var(--text-secondary);cursor:pointer;">
                        <input type="checkbox" checked style="accent-color:var(--accent);width:16px;height:16px;"> Запам'ятати мене
                    </label>
                </div>
                <button type="submit" class="btn btn--primary w-full" style="padding:16px;font-size:1rem;">Увійти</button>
            </form>

            <div style="text-align:center;margin:24px 0;color:var(--text-muted);font-size:0.85rem;">або</div>

            <button class="btn btn--secondary w-full" style="margin-bottom:10px;">
                <span style="font-weight:900;font-size:1.1rem;">G</span> Увійти через Google
            </button>

            <p class="auth-card__footer">
                Немає акаунту? <a href="register.html" class="form-link">Зареєструватися</a>
            </p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true; btn.textContent = 'Вхід...';
            document.querySelectorAll('.auth-error').forEach(el => el.remove());
            try {
                await api.login(
                    document.getElementById('email').value.trim(),
                    document.getElementById('password').value
                );
                window.location.href = 'cabinet.html';
            } catch (err) {
                const div = document.createElement('div');
                div.className = 'auth-error';
                div.style.cssText = 'color:var(--danger);text-align:center;margin-top:12px;font-size:0.88rem;padding:12px;background:rgba(239,68,68,0.1);border-radius:10px;border:1px solid rgba(239,68,68,0.2);';
                div.textContent = err.message;
                document.querySelector('form').after(div);
            } finally {
                btn.disabled = false; btn.textContent = 'Увійти';
            }
        });
    </script>
</body>
</html>
