<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація — МійАукціон</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header__container">
            <div class="header__left">
                <a href="index.html" class="header__logo">
                    <div class="header__logo-icon">💎</div>
                    <div>
                        <div class="header__logo-text">МійАукціон<span class="accent">.UA</span></div>
                        <div class="header__logo-sub">Premium Marketplace</div>
                    </div>
                </a>
            </div>
            <div class="header__right">
                <a href="login.html" class="btn btn--ghost btn--sm">Увійти</a>
            </div>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-page__glow"></div>
        <div class="auth-card" style="max-width:520px;">
            <div class="auth-card__logo">
                <div class="header__logo-icon" style="margin:0 auto;width:56px;height:56px;font-size:28px;">💎</div>
                <h1 class="auth-card__title">Реєстрація</h1>
                <p class="auth-card__subtitle">Створіть акаунт для покупок та продажу</p>
            </div>

            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="firstName">Ім'я</label>
                        <input type="text" id="firstName" class="form-input" placeholder="Ваше ім'я" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="lastName">Прізвище</label>
                        <input type="text" id="lastName" class="form-input" placeholder="Ваше прізвище" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="regUsername">Логін (нікнейм)</label>
                    <input type="text" id="regUsername" class="form-input" placeholder="Ваш унікальний логін" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="regEmail">Email</label>
                    <input type="email" id="regEmail" class="form-input" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="phone">Телефон</label>
                    <input type="tel" id="phone" class="form-input" placeholder="+380 XX XXX XX XX" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="regPassword">Пароль</label>
                        <input type="password" id="regPassword" class="form-input" placeholder="Мін. 8 символів" required minlength="8">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="regPasswordConfirm">Підтвердження</label>
                        <input type="password" id="regPasswordConfirm" class="form-input" placeholder="Повторіть пароль" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="city">Місто</label>
                    <select id="city" class="form-input" style="cursor:pointer;">
                        <option value="">Оберіть місто</option>
                        <option>Київ</option>
                        <option>Харків</option>
                        <option>Одеса</option>
                        <option>Дніпро</option>
                        <option>Львів</option>
                        <option>Запоріжжя</option>
                        <option>Вінниця</option>
                        <option>Полтава</option>
                        <option>Інше</option>
                    </select>
                </div>
                <div class="form-group">
                    <label style="display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-secondary);cursor:pointer;">
                        <input type="checkbox" required style="accent-color:var(--accent);width:16px;height:16px;"> Я приймаю <a href="#" class="form-link">Угоду користувача</a>
                    </label>
                </div>
                <button type="submit" class="btn btn--primary w-full" style="padding:16px;font-size:1rem;">Зареєструватися</button>
            </form>

            <p class="auth-card__footer">
                Вже є акаунт? <a href="login.html" class="form-link">Увійти</a>
            </p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pass = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regPasswordConfirm').value;
            if (pass !== confirm) { alert('Паролі не співпадають!'); return; }
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true; btn.textContent = 'Реєстрація...';
            document.querySelectorAll('.auth-error').forEach(el => el.remove());
            try {
                await api.register({
                    username: document.getElementById('regUsername').value.trim(),
                    email: document.getElementById('regEmail').value.trim(),
                    password: pass,
                    firstName: document.getElementById('firstName').value.trim(),
                    lastName: document.getElementById('lastName').value.trim(),
                    phone: document.getElementById('phone').value.trim(),
                    city: document.getElementById('city').value
                });
                window.location.href = 'cabinet.html';
            } catch (err) {
                const div = document.createElement('div');
                div.className = 'auth-error';
                div.style.cssText = 'color:var(--danger);text-align:center;margin-top:12px;font-size:0.88rem;padding:12px;background:rgba(239,68,68,0.1);border-radius:10px;border:1px solid rgba(239,68,68,0.2);';
                div.textContent = err.message;
                document.querySelector('form').after(div);
            } finally {
                btn.disabled = false; btn.textContent = 'Зареєструватися';
            }
        });
    </script>
</body>
</html>
