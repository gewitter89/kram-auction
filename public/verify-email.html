<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="email_verify">Підтвердження Email — KRAM.UA</title>
    <meta name="description" content="Підтвердіть вашу електронну пошту на KRAM.UA">
    <meta name="robots" content="noindex">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="KRAM.UA">
    <meta property="og:title" content="Підтвердження Email — KRAM.UA">
    <meta property="og:description" content="Підтвердіть вашу електронну пошту на KRAM.UA">
    <meta property="og:image" content="icons/og-image.svg">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="js/i18n.js"></script>
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
        .verify-card { background: var(--card-bg); border-radius: 16px; padding: 40px; text-align: center; max-width: 420px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }
        .verify-card h1 { margin-bottom: 16px; }
        .verify-card p { color: var(--text-muted); margin-bottom: 24px; line-height: 1.6; }
        .verify-card .status { font-size: 48px; margin-bottom: 16px; }
        .verify-card .error { color: #dc3545; }
        .verify-card .success { color: #28a745; }
        .btn-primary { display: inline-block; padding: 12px 24px; background: var(--accent); color: white; text-decoration: none; border-radius: 8px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="verify-card">
        <div style="position:absolute;top:16px;right:16px;display:flex;gap:6px">
            <button id="langToggle" class="header__icon" onclick="i18n&&i18n.toggleLang()" title="English">EN</button>
            <button id="themeToggle" class="header__icon" onclick="toggleTheme()" title="Змінити тему">☀️</button>
        </div>
        <div class="status" id="statusIcon">⏳</div>
        <h1 id="statusTitle" data-i18n="verify_verifying">Підтвердження...</h1>
        <p id="statusMessage" data-i18n="verify_waiting">Зачекайте, перевіряємо ваш токен.</p>
        <a href="login.html" id="loginLink" style="display:none" class="btn-primary" data-i18n="login">Увійти</a>
    </div>

    <script>
        (async () => {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) {
                document.getElementById('statusIcon').textContent = '❌';
                document.getElementById('statusTitle').textContent = i18n ? i18n.t('verify_no_token','Токен відсутній') : 'Токен відсутній';
                document.getElementById('statusMessage').textContent = i18n ? i18n.t('verify_no_token_msg','Посилання не містить токену підтвердження. Перевірте email.') : 'Посилання не містить токену підтвердження. Перевірте email.';
                return;
            }

            try {
                const resp = await fetch('/api/auth/verify-email?token=' + encodeURIComponent(token));
                const data = await resp.json();
                if (resp.ok) {
                    document.getElementById('statusIcon').textContent = '✅';
                    document.getElementById('statusIcon').className = 'status success';
                    document.getElementById('statusTitle').textContent = i18n ? i18n.t('verify_email_confirmed','Email підтверджено!') : 'Email підтверджено!';
                    document.getElementById('statusMessage').textContent = data.message;
                    document.getElementById('loginLink').style.display = 'inline-block';
                } else {
                    document.getElementById('statusIcon').textContent = '❌';
                    document.getElementById('statusIcon').className = 'status error';
                    document.getElementById('statusTitle').textContent = i18n ? i18n.t('verify_failed','Помилка') : 'Помилка';
                    document.getElementById('statusMessage').textContent = data.error || (i18n ? i18n.t('verify_failed_msg','Не вдалося підтвердити email.') : 'Не вдалося підтвердити email.');
                }
            } catch (e) {
                document.getElementById('statusIcon').textContent = '❌';
                document.getElementById('statusIcon').className = 'status error';
                document.getElementById('statusTitle').textContent = 'Помилка';
                document.getElementById('statusMessage').textContent = 'Помилка з\'єднання. Спробуйте пізніше.';
            }
        })();
    </script>
</body>
</html>
