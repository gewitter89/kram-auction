services:
  - type: web
    name: kram-auction
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false
      - key: SITE_URL
        value: https://kram-auction.onrender.com
      - key: DOMAIN
        value: https://kram-auction.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: LIQPAY_PUBLIC_KEY
        sync: false
      - key: LIQPAY_PRIVATE_KEY
        sync: false
    disk:
      name: auction-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data