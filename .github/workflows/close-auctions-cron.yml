name: Close expired auctions

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions: {}

jobs:
  close-auctions:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger close-auctions endpoint
        env:
          CRON_SECRET: ${{ secrets.KRAM_CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET}" ]; then
            echo "KRAM_CRON_SECRET is not configured"
            exit 1
          fi

          response_file="$(mktemp)"
          status="$(curl --silent --show-error --output "${response_file}" --write-out "%{http_code}" \
            --request GET \
            --header "x-cron-secret: ${CRON_SECRET}" \
            "https://kram-auction.vercel.app/api/cron/close-auctions")"

          cat "${response_file}"
          echo
          if [ "${status}" -lt 200 ] || [ "${status}" -ge 300 ]; then
            echo "close-auctions returned HTTP ${status}"
            exit 1
          fi
